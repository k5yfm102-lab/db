<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医療・介護関係者向け 資料室 | ホームケアクリニック横浜港南</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange:      #E8823A;
      --orange-dk:   #C96A28;
      --orange-lt:   #FFF0E6;
      --orange-pale: #FDF6F0;
      --purple:      #8B4F9E;
      --purple-dk:   #6E3A80;
      --purple-lt:   #F3EBF8;
      --peach:       #F9C5A0;
      --lavender:    #D4B8E0;
      --text:        #3a3a3a;
      --text-sub:    #7a7a7a;
      --text-light:  #b0b0b0;
      --border:      #eeddd4;
      --bg:          #FFF8F4;
      --white:       #ffffff;
      --radius-card: 20px;
      --radius-btn:  50px;
      --radius-sm:   8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    /* ── ヘッダー ── */
    header {
      background: var(--white);
      border-bottom: 1px solid #f0ddd4;
      padding: 0 32px;
    }
    .header-inner {
      max-width: 1040px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      gap: 16px;
    }
    .header-logo-wrap {
      display: flex;
      align-items: center;
      text-decoration: none;
    }
    .header-logo-wrap img {
      height: 58px;
      width: auto;
      display: block;
    }
    .header-logo-wrap img.logo-error { display: none; }
    .header-logo-fallback {
      display: none;
      width: 58px; height: 58px;
    }
    .header-logo-fallback svg { width: 58px; height: 58px; }
    .header-back {
      font-size: 13px;
      color: var(--orange);
      text-decoration: none;
      border: 2px solid var(--orange);
      border-radius: var(--radius-btn);
      padding: 7px 20px;
      white-space: nowrap;
      transition: all .18s;
      font-weight: 500;
      letter-spacing: .04em;
      flex-shrink: 0;
    }
    .header-back:hover { background: var(--orange); color: var(--white); }

    /* ── グラデーションライン ── */
    .header-line {
      height: 4px;
      background: linear-gradient(90deg, var(--orange) 0%, #E06090 45%, var(--purple) 100%);
    }

    /* ── お知らせバー ── */
    .notice-bar {
      background: #FFF9E6;
      border-bottom: 1px solid #F5E6A0;
      font-size: 13px;
      text-align: center;
      padding: 10px 24px;
      color: #806200;
      display: none;
    }

    /* ── ヒーロー ── */
    .page-hero {
      background: linear-gradient(135deg, var(--orange-lt) 0%, #F8EAFF 100%);
      padding: 40px 32px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    /* デコレーション円 */
    .page-hero::before {
      content: '';
      position: absolute;
      width: 220px; height: 220px;
      border-radius: 50%;
      background: rgba(232,130,58,.08);
      top: -60px; left: -60px;
    }
    .page-hero::after {
      content: '';
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(139,79,158,.08);
      bottom: -50px; right: -40px;
    }
    .page-hero-en {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .22em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .page-hero h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .05em;
      line-height: 1.4;
    }
    .page-hero h1 span {
      color: var(--text);
      -webkit-text-fill-color: var(--text);
    }
    .page-hero p {
      font-size: 14px;
      font-weight: 300;
      color: var(--text-sub);
      margin-top: 8px;
    }

    /* ── メッセージセクション ── */
    .message-section {
      background: var(--white);
      margin: 24px auto;
      max-width: 1040px;
      border-radius: var(--radius-card);
      border: 2px solid var(--orange-lt);
      padding: 28px 32px;
      display: none;
      position: relative;
    }
    .message-section::before {
      content: '💬';
      position: absolute;
      top: -16px; left: 28px;
      font-size: 28px;
      line-height: 1;
    }
    /* スマホ対応でmainと同じ横padding */
    @media (max-width: 1080px) {
      .message-section { margin: 24px 20px; }
    }
    .message-label-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .message-label-line::before {
      content: '';
      display: block;
      width: 4px; height: 22px;
      background: linear-gradient(180deg, var(--orange), var(--purple));
      border-radius: 4px;
      flex-shrink: 0;
    }
    .message-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .04em;
    }
    .message-body {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-sub);
      line-height: 2;
      white-space: pre-line;
      padding-left: 14px;
    }

    /* ── メイン ── */
    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 20px 72px;
    }

    /* ── 検索 ── */
    .search-row { margin-bottom: 16px; }
    .search-row input {
      width: 100%;
      padding: 12px 20px;
      border: 2px solid var(--border);
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 15px;
      font-weight: 400;
      background: var(--white);
      color: var(--text);
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    .search-row input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(232,130,58,.12);
    }
    .search-row input::placeholder { color: #ccc; }

    /* ── フィルター（ピル型） ── */
    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .filter-btn {
      padding: 8px 20px;
      border-radius: var(--radius-btn);
      border: 2px solid var(--border);
      background: var(--white);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap;
      letter-spacing: .04em;
    }
    .filter-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-pale); }
    .filter-btn.active {
      background: linear-gradient(135deg, var(--orange), #D4629A);
      border-color: transparent;
      color: var(--white);
      box-shadow: 0 4px 12px rgba(232,130,58,.35);
    }

    /* ── 件数・更新 ── */
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 6px;
    }
    .result-count { font-size: 13px; color: var(--text-sub); font-weight: 400; }
    .updated-info { font-size: 12px; color: var(--text-light); }

    /* ── カードグリッド ── */
    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 16px;
    }

    .file-card {
      background: var(--white);
      border: 2px solid #F0E0D8;
      border-radius: var(--radius-card);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color .18s, box-shadow .18s, transform .15s;
    }
    .file-card:hover {
      border-color: var(--orange);
      box-shadow: 0 8px 24px rgba(232,130,58,.15);
      transform: translateY(-3px);
    }

    .card-top { display: flex; gap: 14px; align-items: flex-start; }

    .type-badge {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      letter-spacing: .03em;
      flex-direction: column;
      gap: 1px;
      line-height: 1.2;
    }
    .type-badge .badge-icon { font-size: 18px; line-height: 1; }
    .type-badge .badge-label { font-size: 9px; font-weight: 700; letter-spacing: .02em; }
    .badge-pdf   { background: #FFE8E8; color: #CC3333; }
    .badge-word  { background: #E8EEFF; color: #2A5BD7; }
    .badge-excel { background: #E8FFE8; color: #1A7A2E; }
    .badge-ppt   { background: #FFF0E0; color: #C84B00; }
    .badge-form   { background: var(--orange-lt); color: var(--orange-dk); }
    .badge-notice { background: var(--purple-lt); color: var(--purple-dk); }

    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 15px; font-weight: 500; line-height: 1.5; color: var(--text); word-break: break-all; }
    .card-desc { font-size: 13px; font-weight: 300; color: var(--text-sub); margin-top: 4px; line-height: 1.7; }
    .card-date { font-size: 12px; color: var(--text-light); margin-top: 3px; }

    .card-bottom {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 2px dashed #F0E0D8; padding-top: 12px;
    }
    .cat-tag {
      font-size: 12px; font-weight: 500;
      padding: 4px 14px;
      border-radius: var(--radius-btn);
      background: var(--purple-lt);
      color: var(--purple-dk);
      letter-spacing: .04em;
    }
    .btn-wrap { display: flex; gap: 8px; }

    .btn-view, .btn-dl {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 16px;
      border-radius: var(--radius-btn);
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; text-decoration: none; transition: all .18s;
      letter-spacing: .03em;
    }
    .btn-view {
      border: 2px solid var(--border);
      color: var(--text-sub);
      background: var(--white);
    }
    .btn-view:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-lt); }
    .btn-dl {
      background: linear-gradient(135deg, var(--orange), #D4629A);
      color: var(--white);
      border: 2px solid transparent;
      box-shadow: 0 4px 10px rgba(232,130,58,.3);
    }
    .btn-dl:hover {
      box-shadow: 0 6px 16px rgba(232,130,58,.45);
      transform: translateY(-1px);
    }
    .btn-view svg, .btn-dl svg { width: 13px; height: 13px; fill: currentColor; }
    .btn-dl svg { fill: #fff; }

    /* ── ステータス ── */
    .status-area { text-align: center; padding: 64px 20px; color: var(--text-sub); font-size: 15px; }
    .status-area.error { color: #cc0000; }
    .spinner {
      display: inline-block; width: 32px; height: 32px;
      border: 3px solid var(--border); border-top-color: var(--orange);
      border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── フッター ── */
    footer {
      background: var(--white);
      border-top: 2px solid var(--border);
      text-align: center; padding: 24px;
      font-size: 13px; font-weight: 300; color: var(--text-light);
    }
    footer a { color: var(--orange); text-decoration: none; font-weight: 500; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .header-back { display: none; }
      .file-grid { grid-template-columns: 1fr; }
      .page-hero h1 { font-size: 20px; }
      .page-hero { padding: 32px 20px 28px; }
      header { padding: 0 16px; }
      main { padding: 0 14px 56px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="header-logo-wrap" href="https://www.homecare-cl.jp/" target="_blank">
      <img
        src="https://www.homecare-cl.jp/assets/img/ci/logo.svg"
        alt="ホームケアクリニック横浜港南 ロゴ"
        onerror="this.classList.add('logo-error'); this.nextElementSibling.style.display='block';"
      />
      <span class="header-logo-fallback">
        <svg viewBox="0 0 58 58" xmlns="http://www.w3.org/2000/svg">
          <path d="M29 46C29 46 10 34 10 20C10 14 14 10 20 10C24 10 27.4 12.2 29 15.5C30.6 12.2 34 10 38 10C44 10 48 14 48 20C48 34 29 46 29 46Z" fill="#E8823A"/>
          <path d="M20 42C20 42 6 33 6 19.5C6 13.8 10.5 9.5 16 9.5C18.3 9.5 20.4 10.4 22 11.9L22 15C20.2 13.4 17.9 12.5 16 12.5C12 12.5 9 15.5 9 19.5C9 29 20 37 20 42Z" fill="#8B4F9E" opacity=".75"/>
        </svg>
      </span>
    </a>
    <a class="header-back" href="https://www.homecare-cl.jp/" target="_blank">← クリニックHPへ</a>
  </div>
</header>
<div class="header-line"></div>

<div class="notice-bar" id="noticeBar"></div>

<div class="page-hero">
  <div class="page-hero-en">Documents for Medical &amp; Care Professionals</div>
  <h1><span>医療・介護関係者向け</span> 資料室</h1>
  <p>連携用資料・各種様式のダウンロードページです</p>
</div>

<!-- メッセージセクション -->
<div class="message-section" id="messageSection">
  <div class="message-label-line">
    <span class="message-title" id="messageTitle">医療・介護関係者様へ</span>
  </div>
  <div class="message-body" id="messageBody"></div>
</div>

<main>
  <div class="search-row">
    <input type="search" id="searchInput" placeholder="🔍　ファイル名・説明で検索..." />
  </div>

  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" data-cat="all">すべて</button>
  </div>

  <div class="meta-row">
    <span class="result-count" id="resultCount"></span>
    <span class="updated-info" id="updatedInfo"></span>
  </div>

  <div id="fileArea">
    <div class="status-area">
      <div class="spinner"></div><br>資料一覧を読み込んでいます…
    </div>
  </div>
</main>

<footer>
  <a href="https://www.homecare-cl.jp/">ホームケアクリニック横浜港南</a>　／　医療連携・地域支援室　／　このページは関係機関専用です<br>
  <span id="fyear"></span>
</footer>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwIlwGDrTNjNGMWzqIocSSHE_dxcXkGIpAgM9YpiYSWctt5XLE3wbdYsaNQ4fNNn-1n/exec';

  document.getElementById('fyear').textContent =
    '© ' + new Date().getFullYear() + ' ホームケアクリニック横浜港南';

  let allFiles = [], currentCat = 'all', searchWord = '';

  async function loadFiles() {
    try {
      const res = await fetch(GAS_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      if (data.notice) {
        const bar = document.getElementById('noticeBar');
        bar.textContent = '📢 ' + data.notice;
        bar.style.display = 'block';
      }
      if (data.updatedAt) {
        document.getElementById('updatedInfo').textContent = '最終更新：' + data.updatedAt;
      }
      if (data.messageBody) {
        document.getElementById('messageTitle').textContent = data.messageTitle || '医療・介護関係者様へ';
        document.getElementById('messageBody').textContent = data.messageBody;
        document.getElementById('messageSection').style.display = 'block';
      }

      allFiles = (data.files || []).filter(f =>
        String(f.active).trim() !== '非表示' &&
        String(f.active).trim() !== 'FALSE'
      );
      buildFilter();
      render();
    } catch (e) {
      document.getElementById('fileArea').innerHTML =
        '<div class="status-area error">⚠️ 資料一覧の読み込みに失敗しました。<br>しばらくしてから再読み込みをお試しください。</div>';
    }
  }

  function buildFilter() {
    const cats = [...new Set(allFiles.map(f => f.category).filter(Boolean))];
    const row = document.getElementById('filterRow');
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      btn.addEventListener('click', () => {
        currentCat = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
      row.appendChild(btn);
    });
  }

  document.querySelector('[data-cat="all"]').addEventListener('click', function () {
    currentCat = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    render();
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    searchWord = e.target.value.trim().toLowerCase();
    render();
  });

  function formatJpDate(val) {
    if (!val) return '';
    const d = new Date(val);
    if (isNaN(d)) return val;
    const week = ['日','月','火','水','木','金','土'];
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${week[d.getDay()]})`;
  }

  function typeInfo(name, doctype) {
    // 資料分類（G列）が入っていればそちら優先
    const dt = (doctype || '').trim();
    if (dt === '書式' || dt === '様式') return { label: '書式', cls: 'badge-form' };
    if (dt === 'お知らせ' || dt === '案内') return { label: 'お知らせ', cls: 'badge-notice' };

    // 拡張子で判定
    const n = (name || '').toLowerCase();
    if (n.includes('.pdf'))   return { label: 'PDF',   cls: 'badge-pdf' };
    if (n.match(/\.docx?/))  return { label: 'Word',  cls: 'badge-word' };
    if (n.match(/\.xlsx?/))  return { label: 'Excel', cls: 'badge-excel' };
    if (n.match(/\.pptx?/))  return { label: 'PPT',   cls: 'badge-ppt' };
    // 分類もなく拡張子も不明な場合はお知らせ扱い
    return { label: 'お知らせ', cls: 'badge-notice' };
  }

  function driveUrls(url) {
    const m = (url || '').match(/\/d\/([a-zA-Z0-9_-]+)/);
    if (m) {
      return {
        view: `https://drive.google.com/file/d/${m[1]}/view`,
        dl:   `https://drive.google.com/uc?export=download&id=${m[1]}`
      };
    }
    return { view: url, dl: url };
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    let list = allFiles;
    if (currentCat !== 'all') list = list.filter(f => f.category === currentCat);
    if (searchWord) list = list.filter(f =>
      [f.name, f.description, f.category].some(v =>
        (v || '').toLowerCase().includes(searchWord)
      )
    );

    document.getElementById('resultCount').textContent =
      list.length ? `${list.length} 件の資料` : '';

    const area = document.getElementById('fileArea');
    if (!list.length) {
      area.innerHTML = '<div class="status-area">該当する資料が見つかりませんでした。</div>';
      return;
    }

    const grid = document.createElement('div');
    grid.className = 'file-grid';

    list.forEach(f => {
      const t = typeInfo(f.name, f.doctype);
      const u = driveUrls(f.url);
      const badgeIcons = {
        'badge-pdf':    { icon: '📄', label: 'PDF' },
        'badge-word':   { icon: '📝', label: 'Word' },
        'badge-excel':  { icon: '📊', label: 'Excel' },
        'badge-ppt':    { icon: '📑', label: 'PPT' },
        'badge-form':   { icon: '✏️', label: '書式' },
        'badge-notice': { icon: '📢', label: 'お知らせ' },
      };
      const bi = badgeIcons[t.cls] || { icon: '📄', label: t.label };
      const card = document.createElement('div');
      card.className = 'file-card';
      card.innerHTML = `
        <div class="card-top">
          <div class="type-badge ${t.cls}">
            <span class="badge-icon">${bi.icon}</span>
            <span class="badge-label">${bi.label}</span>
          </div>
          <div class="card-info">
            <div class="card-name">${esc(f.name)}</div>
            ${f.description ? `<div class="card-desc">${esc(f.description)}</div>` : ''}
            ${f.date ? `<div class="card-date">更新：${esc(formatJpDate(f.date))}</div>` : ''}
          </div>
        </div>
        <div class="card-bottom">
          <span class="cat-tag">${esc(f.category || '一般')}</span>
          <div class="btn-wrap">
            <a class="btn-view" href="${u.view}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>
              閲覧
            </a>
